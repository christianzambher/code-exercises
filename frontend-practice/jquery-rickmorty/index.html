<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Rick & Morty Explorer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-4">
        <h1 class="text-center mb-4">Rick & Morty Explorer</h1>

        <div class="input-group mb-3">
            <input type="text" id="searchInput" class="form-control" placeholder="Buscar personaje..." />
            <button id="searchBtn" class="btn btn-primary">Buscar</button>
        </div>
    </div>

    <div id="loader" class="text-center my-3" style="display:none;">
        Cargando...
    </div>
    
    <div id="status" class="text-center mb-3"></div>

    <div id="characters" class="row g-3"></div>

    <div id="pagination">
        <button id="prevBtn" class="btn btn-secondary">Anterior</button>
        <button id="nextBtn" class="btn btn-secondary">Siguiente</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
