<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Pokemon Finder</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="container">
    <h1>Pokemon Finder</h1>

    <input type="text" id="pokemonInput" placeholder="Ej: pikachu" />

    <button id="searchBtn">Buscar</button>

    <div id="status"></div>
    <div id="loader" class="hidden">Cargando...</div>

    <div id="history"></div>
    <button id="clearHistoryBtn">Limpiar historial</button>
    <br>
    <div id="pokemonCard" class="card hidden">
      <h2 id="pokemonName"></h2>
      <img id="pokemonImg" />
      <img id="pokemonImgShiny" />
      <p id="pokemonTypes"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
